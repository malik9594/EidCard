<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Greeting Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library to capture the card as an image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --primary-gold: #D4AF37;
            --dark-emerald: #064E3B;
            --deep-bg: #011611;
        }

        body {
            background-color: var(--deep-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, #0a2e24 0%, #011611 100%);
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* CAPTURE WRAPPER - Removed padding to ensure perfect crop */
        #capture-area {
            display: inline-block;
            background-color: var(--deep-bg);
        }

        /* CARD BLOCK - Made square for perfect sharing/cropping */
        .card-container {
            position: relative;
            width: 380px; /* Fixed width for consistent sharing */
            background: linear-gradient(145deg, #064E3B, #022c22);
            border: 6px solid var(--primary-gold);
            border-radius: 0px; /* Removed rounded corners as requested */
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            z-index: 10;
        }

        .islamic-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l5.878 18.09h19.022L39.46 29.27 45.338 47.36 30 36.18 14.662 47.36 20.54 29.27 5.1 18.09h19.022L30 0z' fill='%23D4AF37' fill-opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .card-content {
            position: relative;
            z-index: 5;
        }

        .photo-frame {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 6px solid var(--primary-gold);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 15%; 
            display: block;
        }

        .photo-placeholder-text {
            position: absolute;
            color: var(--primary-gold);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 20px;
        }

        .wish-title {
            font-family: 'Great Vibes', cursive;
            font-size: 3.8rem;
            color: var(--primary-gold);
            margin-bottom: 0px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.6);
        }

        .recipient-name {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .message-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #f3f4f6;
            margin-bottom: 25px;
            font-weight: 300;
            padding: 0 10px;
        }

        .sender-name-display {
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            color: var(--primary-gold);
            margin-top: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .company-credit {
            font-size: 0.7rem;
            color: var(--primary-gold);
            opacity: 0.7;
            margin-top: 25px;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* CONTROLS */
        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 100;
            width: 100%;
            max-width: 400px;
            padding-bottom: 40px;
        }

        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .text-input, .textarea-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid var(--primary-gold);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            font-size: 0.95rem;
        }

        .textarea-input {
            height: 90px;
            resize: none;
        }

        .button-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .btn-gold { background: var(--primary-gold); color: #011611; }
        .btn-blue { background: #2563EB; color: white; }

        .btn:active { transform: scale(0.96); }

        #share-message {
            position: fixed;
            bottom: 30px;
            background: #D4AF37;
            color: #011611;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            display: none;
            z-index: 200;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (max-width: 420px) {
            .card-container { width: 100%; max-width: 360px; }
            .wish-title { font-size: 3rem; }
            .recipient-name { font-size: 1.8rem; }
            .photo-frame { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>

    <div class="stars-bg" id="star-container"></div>
    <div id="share-message">Creating Image...</div>

    <!-- CAPTURE AREA -->
    <div id="capture-area">
        <!-- THE CARD BLOCK (Square for perfect cropping) -->
        <div class="card-container" id="card-block">
            <div class="islamic-pattern"></div>
            
            <div class="card-content">
                <div class="photo-frame">
                    <span class="photo-placeholder-text" id="placeholder-text">Add Photo</span>
                    <img src="" id="display-image" alt="Recipient" style="display: none;">
                </div>

                <h1 class="wish-title">Eid Mubarak</h1>
                <h2 class="recipient-name" id="display-recipient">Kazim Raza</h2>
                
                <p class="message-text" id="display-message">
                    May Allah bless you with happiness and grace your home with warmth and peace. Have a wonderful Eid celebration!
                </p>

                <div class="sender-name-display" id="display-sender">Hassan Raza</div>

                <div class="mt-4 flex justify-center space-x-3 text-2xl opacity-50">
                    <span>☪</span><span>★</span><span>☪</span>
                </div>

                <div class="company-credit">Created by: QaimDev</div>
            </div>
        </div>
    </div>

    <!-- CONTROLS UI -->
    <div class="controls">
        <div class="input-group">
            <input type="text" id="recipientInput" class="text-input" placeholder="Recipient Name" value="Kazim Raza">
            <textarea id="messageInput" class="textarea-input" placeholder="Custom Message">May Allah bless you with happiness and grace your home with warmth and peace. Have a wonderful Eid celebration!</textarea>
            <input type="text" id="senderInput" class="text-input" placeholder="Sender Name" value="Hassan Raza">
        </div>
        
        <div class="button-group">
            <input type="file" id="imageInput" accept="image/*">
            <button class="btn btn-gold" onclick="document.getElementById('imageInput').click()">
                <span>📷</span> Add/Change Photo
            </button>
            <button class="btn btn-blue" onclick="handleShare()">
                <span>📤</span> Share on WhatsApp
            </button>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const recipientInput = document.getElementById('recipientInput');
        const messageInput = document.getElementById('messageInput');
        const senderInput = document.getElementById('senderInput');
        
        const displayImage = document.getElementById('display-image');
        const placeholderText = document.getElementById('placeholder-text');
        const displayRecipient = document.getElementById('display-recipient');
        const displayMessage = document.getElementById('display-message');
        const displaySender = document.getElementById('display-sender');
        const shareMsg = document.getElementById('share-message');

        recipientInput.addEventListener('input', e => displayRecipient.innerText = e.target.value);
        messageInput.addEventListener('input', e => displayMessage.innerText = e.target.value);
        senderInput.addEventListener('input', e => displaySender.innerText = e.target.value);

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    displayImage.src = event.target.result;
                    displayImage.style.display = 'block';
                    placeholderText.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        async function handleShare() {
            if (!displayImage.src || displayImage.style.display === 'none') {
                alert("Please add a photo first!");
                return;
            }

            shareMsg.style.display = 'block';
            shareMsg.innerText = "Processing Your Card...";

            try {
                await document.fonts.ready;
                
                // Target the card block directly to remove extra background padding
                const cardBlock = document.getElementById('card-block');
                
                const canvas = await html2canvas(cardBlock, {
                    scale: 3, 
                    backgroundColor: '#011611', // Force solid background matching the card's dark theme
                    useCORS: true,
                    logging: false
                });

                canvas.toBlob(async (blob) => {
                    const fileName = `Eid_Card_QaimDev.png`;
                    const file = new File([blob], fileName, { type: "image/png" });
                    
                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: 'Eid Mubarak!',
                                text: `Eid Mubarak from QaimDev!`
                            });
                        } catch (err) { if (err.name !== 'AbortError') throw err; }
                        shareMsg.style.display = 'none';
                    } else {
                        const link = document.createElement('a');
                        link.download = fileName;
                        link.href = canvas.toDataURL("image/png");
                        link.click();
                        shareMsg.innerText = "Saved to Gallery! Share it now.";
                        setTimeout(() => shareMsg.style.display = 'none', 4000);
                    }
                }, "image/png");

            } catch (err) {
                console.error(err);
                shareMsg.innerText = "Error. Please try again.";
                setTimeout(() => shareMsg.style.display = 'none', 3000);
            }
        }

        const starContainer = document.getElementById('star-container');
        for (let i = 0; i < 70; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            starContainer.appendChild(star);
        }
    </script>
</body>
</html>
